<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@300;500&family=Share+Tech+Mono&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100vh; overflow:hidden; background:#020408; }
    canvas#bg { position:fixed; inset:0; z-index:0; display:block; }

    /* ── HUD corners ── */
    .hud-corner { position:fixed; width:36px; height:36px; border-color:rgba(0,212,255,0.35); border-style:solid; }
    .hud-corner.tl { top:12px; left:12px; border-width:2px 0 0 2px; }
    .hud-corner.tr { top:12px; right:12px; border-width:2px 2px 0 0; }
    .hud-corner.bl { bottom:12px; left:12px; border-width:0 0 2px 2px; }
    .hud-corner.br { bottom:12px; right:12px; border-width:0 2px 2px 0; }

    #scan { position:fixed; inset:0; z-index:5; pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px); }

    /* ── Center HUD ── */
    #hud { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column;
      align-items:center; justify-content:center; pointer-events:none; padding-bottom:60px; }

    #logo-block { text-align:center; animation:fade-in 2.5s ease forwards; opacity:0; pointer-events:auto; }
    @keyframes fade-in { 0%{opacity:0;transform:translateY(18px)} 100%{opacity:1;transform:translateY(0)} }

    .logo-hex { font-size:48px; color:#00d4ff; line-height:1; display:block; margin-bottom:12px;
      filter:drop-shadow(0 0 24px rgba(0,212,255,0.7)) drop-shadow(0 0 60px rgba(0,212,255,0.3));
      animation:hex-breathe 4s ease-in-out infinite; }
    @keyframes hex-breathe {
      0%,100% { transform:scale(1); filter:drop-shadow(0 0 24px rgba(0,212,255,0.7)) drop-shadow(0 0 60px rgba(0,212,255,0.3)); }
      50%      { transform:scale(1.06); filter:drop-shadow(0 0 36px rgba(0,212,255,0.9)) drop-shadow(0 0 90px rgba(0,212,255,0.5)); }
    }

    h1 { font-family:'Orbitron',monospace; font-size:40px; font-weight:900; letter-spacing:14px;
      background:linear-gradient(135deg,#00d4ff 0%,#0080ff 50%,#00ff88 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:10px; background-size:200%; animation:shimmer 6s linear infinite; }
    @keyframes shimmer { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }

    .tagline { font-family:'Rajdhani',sans-serif; font-size:13px; letter-spacing:5px;
      color:rgba(90,138,170,0.8); text-transform:uppercase; margin-bottom:28px; }

    #stats-strip { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
    .stat-chip { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
      color:#5a8aaa; border:1px solid rgba(0,180,255,0.18); padding:5px 12px; border-radius:3px;
      background:rgba(2,6,14,0.6); backdrop-filter:blur(8px); }
    .stat-chip span { color:#00d4ff; }

    #dbg { position:fixed; top:14px; right:14px; z-index:20; font-family:'Share Tech Mono',monospace;
      font-size:10px; color:rgba(0,212,255,0.35); text-align:right; pointer-events:none; line-height:1.8; }

    /* ── Voice panel (bottom-left) ── */
    #voice-panel {
      position:fixed; bottom:20px; left:20px; z-index:20;
      width:230px; background:rgba(2,6,14,0.88); backdrop-filter:blur(14px);
      border:1px solid rgba(0,180,255,0.2); border-radius:8px; padding:14px 16px;
      pointer-events:auto;
    }
    .vp-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .vp-title { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; color:rgba(0,212,255,0.5); }
    .vp-state { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1px;
      padding:2px 7px; border-radius:2px; border:1px solid; }
    .vp-state.idle      { color:rgba(90,138,170,0.7); border-color:rgba(90,138,170,0.2); }
    .vp-state.listening { color:#ffaa00; border-color:rgba(255,170,0,0.4); animation:state-pulse 1s ease-in-out infinite; }
    .vp-state.speaking  { color:#00ff88; border-color:rgba(0,255,136,0.4); animation:state-pulse 0.6s ease-in-out infinite; }
    .vp-state.processing{ color:#00d4ff; border-color:rgba(0,212,255,0.4); }
    @keyframes state-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .vp-orb-row { display:flex; align-items:center; gap:14px; margin-bottom:12px; }
    .vp-orb { width:72px; height:72px; border-radius:50%; flex-shrink:0;
      border:2px solid rgba(255,170,0,0.35);
      background:radial-gradient(circle at 35% 35%, rgba(255,170,0,0.2), rgba(255,80,0,0.06), transparent 70%);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.3s; font-size:26px;
      box-shadow:0 0 20px rgba(255,170,0,0.15); }
    .vp-orb:hover { border-color:rgba(255,170,0,0.8); box-shadow:0 0 30px rgba(255,170,0,0.35); }
    .vp-orb.listening { border-color:rgba(255,170,0,0.9); box-shadow:0 0 30px rgba(255,170,0,0.5);
      animation:orb-pulse 1.5s ease-in-out infinite; }
    .vp-orb.speaking { border-color:rgba(0,255,136,0.8); box-shadow:0 0 30px rgba(0,255,136,0.4);
      animation:orb-pulse 0.6s ease-in-out infinite; }
    .vp-orb.processing { border-color:rgba(0,212,255,0.8); box-shadow:0 0 25px rgba(0,212,255,0.35); }
    @keyframes orb-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

    .vp-meta { flex:1; min-width:0; }
    .vp-meta-label { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; color:rgba(90,138,170,0.5); }
    .vp-meta-val { font-family:'Share Tech Mono',monospace; font-size:12px; color:#00d4ff;
      margin-top:2px; margin-bottom:8px; }

    .vp-transcript { font-family:'Rajdhani',sans-serif; font-size:12px; line-height:1.5;
      color:rgba(200,232,255,0.6); border-top:1px solid rgba(0,180,255,0.1);
      padding-top:10px; max-height:56px; overflow:hidden;
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
    .vp-transcript.has-text { color:rgba(200,232,255,0.85); }

    /* ── Activity log (bottom-right) ── */
    #activity-panel {
      position:fixed; bottom:20px; right:20px; z-index:20;
      width:290px; background:rgba(2,6,14,0.88); backdrop-filter:blur(14px);
      border:1px solid rgba(0,180,255,0.2); border-radius:8px; padding:14px 16px;
      pointer-events:auto;
    }
    .ap-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .ap-title { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; color:rgba(0,212,255,0.5); }
    .ap-live { font-family:'Share Tech Mono',monospace; font-size:9px; color:#00ff88;
      animation:ap-blink 2s step-end infinite; }
    @keyframes ap-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    #activity-list { display:flex; flex-direction:column; gap:5px; max-height:180px; overflow:hidden; }
    .act-row { display:flex; gap:8px; align-items:flex-start; }
    .act-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .act-dot.voice { background:#ffaa00; }
    .act-dot.ai    { background:#00d4ff; }
    .act-dot.chat  { background:#0080ff; }
    .act-dot.tool  { background:#00ff88; }
    .act-dot.system{ background:rgba(90,138,170,0.5); }
    .act-text { font-family:'Share Tech Mono',monospace; font-size:10px; color:rgba(200,232,255,0.6);
      line-height:1.5; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; flex:1; }
    .act-ts { font-family:'Share Tech Mono',monospace; font-size:9px; color:rgba(90,138,170,0.4);
      flex-shrink:0; }

    .ap-empty { font-family:'Share Tech Mono',monospace; font-size:10px; color:rgba(90,138,170,0.4);
      text-align:center; padding:20px 0; }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="scan"></div>

  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <div id="hud">
    <div id="logo-block">
      <span class="logo-hex">&#x2b21;</span>
      <h1>JARVIS</h1>
      <p class="tagline">Portable AI Workspace &nbsp;&middot;&nbsp; Local &nbsp;&middot;&nbsp; Offline &nbsp;&middot;&nbsp; Yours</p>
      <div id="stats-strip">
        <div class="stat-chip">MODEL <span id="stat-model">idle</span></div>
        <div class="stat-chip">RAM <span id="stat-ram">&mdash;</span></div>
        <div class="stat-chip">VRAM <span id="stat-vram">&mdash;</span></div>
        <div class="stat-chip">CPU <span id="stat-cpu">&mdash;</span></div>
      </div>
    </div>
  </div>

  <!-- Voice panel -->
  <div id="voice-panel">
    <div class="vp-header">
      <span class="vp-title">VOICE</span>
      <span class="vp-state idle" id="vp-state">IDLE</span>
    </div>
    <div class="vp-orb-row">
      <div class="vp-orb" id="vp-orb" title="Open Voice Assistant">&#9673;</div>
      <div class="vp-meta">
        <div class="vp-meta-label">WAKE WORD</div>
        <div class="vp-meta-val" id="vp-wake-word">jarvis</div>
        <div class="vp-meta-label">STATUS</div>
        <div class="vp-meta-val" id="vp-detail">waiting...</div>
      </div>
    </div>
    <div class="vp-transcript" id="vp-transcript">Say "Jarvis" to begin...</div>
  </div>

  <!-- Activity log panel -->
  <div id="activity-panel">
    <div class="ap-header">
      <span class="ap-title">LIVE ACTIVITY</span>
      <span class="ap-live">&#9679; LIVE</span>
    </div>
    <div id="activity-list">
      <div class="ap-empty">No activity yet</div>
    </div>
  </div>

  <div id="dbg">
    <div id="dbg-fps">60 fps</div>
    <div id="dbg-bonds">-- bonds</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ── Three.js background ───────────────────────────────────────────
  const canvas = document.getElementById('bg');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x020408, 1);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 90);
  scene.fog = new THREE.FogExp2(0x020408, 0.008);

  const CFG = {
    NODE_COUNT: 120, BOND_DIST: 22, BOND_MAX: 3, SPREAD: 60,
    MOUSE_FORCE: 0.04,
    COLOR_A: new THREE.Color(0x00d4ff),
    COLOR_B: new THREE.Color(0x0080ff),
    COLOR_C: new THREE.Color(0x00ff88),
  };

  const nodes = [];
  const nodeGeo = new THREE.SphereGeometry(0.55, 7, 7);

  function randSphere(r) {
    const u=Math.random(),v=Math.random(),w=Math.random();
    const theta=2*Math.PI*u, phi=Math.acos(2*v-1), rad=r*Math.cbrt(w);
    return new THREE.Vector3(rad*Math.sin(phi)*Math.cos(theta), rad*Math.sin(phi)*Math.sin(theta), rad*Math.cos(phi));
  }

  for (let i=0;i<CFG.NODE_COUNT;i++) {
    const pos=randSphere(CFG.SPREAD);
    const c=Math.random();
    const color=c<0.6?CFG.COLOR_A.clone():c<0.85?CFG.COLOR_B.clone():CFG.COLOR_C.clone();
    const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.75});
    const mesh=new THREE.Mesh(nodeGeo,mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    nodes.push({mesh,baseColor:color.clone(),vel:new THREE.Vector3((Math.random()-.5)*0.012,(Math.random()-.5)*0.012,(Math.random()-.5)*0.012),phase:Math.random()*Math.PI*2});
  }

  const bondGroup=new THREE.Group(); scene.add(bondGroup); const bonds=[];
  function rebuildBonds() {
    while(bondGroup.children.length) bondGroup.remove(bondGroup.children[0]);
    bonds.length=0;
    const cnt=new Array(CFG.NODE_COUNT).fill(0);
    for(let i=0;i<nodes.length;i++){if(cnt[i]>=CFG.BOND_MAX)continue;for(let j=i+1;j<nodes.length;j++){if(cnt[j]>=CFG.BOND_MAX)continue;const d=nodes[i].mesh.position.distanceTo(nodes[j].mesh.position);if(d<CFG.BOND_DIST){const geo=new THREE.BufferGeometry().setFromPoints([nodes[i].mesh.position.clone(),nodes[j].mesh.position.clone()]);const mat=new THREE.LineBasicMaterial({color:0x00d4ff,transparent:true,opacity:(1-d/CFG.BOND_DIST)*0.35});const line=new THREE.Line(geo,mat);bondGroup.add(line);bonds.push({line,i,j});cnt[i]++;cnt[j]++;}}}
    document.getElementById('dbg-bonds').textContent=bonds.length+' bonds';
  }
  rebuildBonds();

  let mouse3=new THREE.Vector3();
  const raycaster=new THREE.Raycaster(), planeZ=new THREE.Plane(new THREE.Vector3(0,0,1),0), mouseNDC=new THREE.Vector2();
  window.addEventListener('mousemove',(e)=>{
    mouseNDC.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
    raycaster.setFromCamera(mouseNDC,camera); raycaster.ray.intersectPlane(planeZ,mouse3);
  });

  let frame=0, fpsTs=performance.now(), fps=60;
  function animate() {
    requestAnimationFrame(animate);
    const t=performance.now()*0.001; frame++;
    camera.position.x=Math.sin(t*0.04)*7; camera.position.y=Math.cos(t*0.03)*4; camera.lookAt(scene.position);
    for(let i=0;i<nodes.length;i++){const n=nodes[i],pos=n.mesh.position;n.vel.x+=Math.sin(t*0.3+n.phase)*0.0003;n.vel.y+=Math.cos(t*0.25+n.phase*1.3)*0.0003;n.vel.z+=Math.sin(t*0.2+n.phase*0.7)*0.0002;if(mouse3.lengthSq()>0){const diff=pos.clone().sub(mouse3);const d2=diff.lengthSq();if(d2<400&&d2>0.1)n.vel.addScaledVector(diff.normalize(),CFG.MOUSE_FORCE/(d2+1)*8);}n.vel.multiplyScalar(0.985);if(pos.length()>CFG.SPREAD*1.2)n.vel.addScaledVector(pos.clone().negate().normalize(),0.002);pos.add(n.vel);n.mesh.material.opacity=Math.min(1,0.55+0.2*Math.sin(t*1.5+n.phase));n.mesh.material.color.lerp(n.baseColor,0.05);}
    if(frame%2===0){for(const b of bonds){const pi=nodes[b.i].mesh.position,pj=nodes[b.j].mesh.position;const pos=b.line.geometry.attributes.position;pos.setXYZ(0,pi.x,pi.y,pi.z);pos.setXYZ(1,pj.x,pj.y,pj.z);pos.needsUpdate=true;const d=pi.distanceTo(pj);b.line.material.opacity=(1-d/CFG.BOND_DIST)*0.35;}}
    if(frame%180===0) rebuildBonds();
    if(frame%30===0){const now=performance.now();fps=Math.round(30000/(now-fpsTs));fpsTs=now;document.getElementById('dbg-fps').textContent=fps+' fps';}
    renderer.render(scene,camera);
  }
  animate();
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

  // ── Backend polling ───────────────────────────────────────────────
  const BACKEND = 'http://localhost:8000';

  async function pollStats() {
    try {
      const d = await (await fetch(`${BACKEND}/system/stats`, {signal:AbortSignal.timeout(2000)})).json();
      document.getElementById('stat-model').textContent = d.active_model || 'idle';
      document.getElementById('stat-ram').textContent   = d.ram_used_gb  ? d.ram_used_gb  + ' GB' : '--';
      document.getElementById('stat-vram').textContent  = d.vram_used_mb ? d.vram_used_mb + ' MB' : '--';
      document.getElementById('stat-cpu').textContent   = d.cpu_percent  ? d.cpu_percent  + '%'   : '--';
    } catch {}
  }

  // ── Voice panel polling ───────────────────────────────────────────
  const orbEl    = document.getElementById('vp-orb');
  const stateEl  = document.getElementById('vp-state');
  const detailEl = document.getElementById('vp-detail');
  const transEl  = document.getElementById('vp-transcript');

  orbEl.addEventListener('click', () => {
    try { window.parent.Router.navigate('voice'); } catch {}
  });

  async function pollVoice() {
    try {
      const d = await (await fetch(`${BACKEND}/voice/status`, {signal:AbortSignal.timeout(2000)})).json();
      const ww = d.wake_word || 'jarvis';
      document.getElementById('vp-wake-word').textContent = ww;

      let state = 'idle';
      if (d.speaking)   state = 'speaking';
      else if (d.listening) state = 'listening';
      else if (d.wake_active) state = 'idle';

      stateEl.textContent = state.toUpperCase();
      stateEl.className   = 'vp-state ' + state;
      orbEl.className     = 'vp-orb ' + state;

      detailEl.textContent =
        d.speaking   ? 'speaking response' :
        d.listening  ? 'listening...' :
        d.wake_active? 'wake detection active' : 'offline';
    } catch {
      stateEl.textContent = 'OFFLINE';
      stateEl.className   = 'vp-state idle';
      detailEl.textContent = 'backend unreachable';
    }
  }

  // Load last transcript from chat history (voice writes to "default" session)
  async function pollTranscript() {
    try {
      const d = await (await fetch(`${BACKEND}/chat/history?session_id=default&limit=4`, {signal:AbortSignal.timeout(2000)})).json();
      const msgs = (d.messages || []).filter(m => m.role === 'assistant');
      if (msgs.length > 0) {
        const last = msgs[msgs.length - 1].content;
        transEl.textContent = last.slice(0, 140) + (last.length > 140 ? '...' : '');
        transEl.classList.add('has-text');
      }
    } catch {}
  }

  // ── Activity log polling ──────────────────────────────────────────
  const listEl = document.getElementById('activity-list');
  let lastEventTs = 0;

  function fmtTs(ts) {
    const d = new Date(ts * 1000);
    return d.getHours().toString().padStart(2,'0') + ':' +
           d.getMinutes().toString().padStart(2,'0') + ':' +
           d.getSeconds().toString().padStart(2,'0');
  }

  function typeColor(type) {
    if (type === 'voice') return 'voice';
    if (type === 'ai')    return 'ai';
    if (type === 'chat')  return 'chat';
    if (type === 'tool')  return 'tool';
    return 'system';
  }

  async function pollActivity() {
    try {
      const d = await (await fetch(`${BACKEND}/system/activity?limit=12`, {signal:AbortSignal.timeout(2000)})).json();
      const events = d.events || [];
      if (events.length === 0) return;

      const newest = events[events.length - 1].ts;
      if (newest <= lastEventTs) return;
      lastEventTs = newest;

      listEl.innerHTML = '';
      // Show most recent first
      for (const ev of [...events].reverse()) {
        const row = document.createElement('div');
        row.className = 'act-row';
        const text = ev.detail ? `${ev.msg} → ${ev.detail}` : ev.msg;
        row.innerHTML = `
          <div class="act-dot ${typeColor(ev.type)}"></div>
          <div class="act-text" title="${text}">${text}</div>
          <div class="act-ts">${fmtTs(ev.ts)}</div>`;
        listEl.appendChild(row);
      }
    } catch {}
  }

  // ── Boot ──────────────────────────────────────────────────────────
  pollStats();        setInterval(pollStats,    5000);
  pollVoice();        setInterval(pollVoice,    2000);
  pollTranscript();   setInterval(pollTranscript, 8000);
  pollActivity();     setInterval(pollActivity,  3000);
  </script>
</body>
</html>
