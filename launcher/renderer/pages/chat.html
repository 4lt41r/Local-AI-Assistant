<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Share+Tech+Mono&family=Rajdhani:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent:#00d4ff; --bg:#020408; --panel:#080f1a;
      --border:rgba(0,180,255,0.15); --text:#c8e8ff; --muted:#2a4a6a;
      --green:#00ff88; --amber:#ffaa00;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif;
           height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    .page-header { padding:12px 20px 10px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .page-header h2 { font-family:'Orbitron',monospace; font-size:12px; letter-spacing:3px; }
    .header-right { display:flex; align-items:center; gap:10px; }
    .model-badge { font-family:'Share Tech Mono',monospace; font-size:11px;
      color:var(--accent); border:1px solid rgba(0,212,255,0.3); padding:3px 10px; border-radius:3px; }
    .clear-btn { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:1px;
      padding:4px 10px; background:transparent; border:1px solid var(--muted);
      color:var(--muted); border-radius:3px; cursor:pointer; transition:all 0.2s; }
    .clear-btn:hover { border-color:#ff3355; color:#ff3355; }

    #messages { flex:1; overflow-y:auto; padding:16px 20px;
      display:flex; flex-direction:column; gap:10px; }

    .msg { max-width:80%; display:flex; flex-direction:column; gap:3px; }
    .msg.user      { align-self:flex-end;  align-items:flex-end; }
    .msg.assistant { align-self:flex-start; align-items:flex-start; }

    .msg-meta { display:flex; align-items:center; gap:8px; }
    .msg-role { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; color:var(--muted); }
    .time-badge { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted);
      border:1px solid var(--border); padding:1px 5px; border-radius:2px; }

    .msg-bubble { padding:10px 14px; border-radius:6px;
      font-size:14px; line-height:1.6; max-width:100%; word-break:break-word; }
    .msg.user .msg-bubble {
      background:rgba(0,128,255,0.12); border:1px solid rgba(0,128,255,0.3); }
    .msg.assistant .msg-bubble {
      background:rgba(8,20,36,0.9); border:1px solid var(--border); }

    .cursor { display:inline-block; width:2px; height:14px;
      background:var(--accent); margin-left:2px; vertical-align:middle;
      animation:blink 0.7s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .msg-bubble pre { background:rgba(0,0,0,0.5); border:1px solid var(--border);
      border-radius:4px; padding:10px; margin-top:8px; overflow-x:auto;
      font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--accent); }
    .msg-bubble code { font-family:'Share Tech Mono',monospace; color:var(--green);
      background:rgba(0,255,136,0.08); padding:1px 5px; border-radius:3px; }

    /* ── Thinking indicator ───────────────────────────────── */
    .thinking-wrap { align-self:flex-start; display:none; }
    .thinking-wrap.show { display:flex; flex-direction:column; gap:5px; }

    .typing-dots { display:flex; gap:5px; padding:10px 14px;
      background:rgba(8,20,36,0.9); border:1px solid var(--border); border-radius:6px;
      border-bottom-left-radius:2px; align-items:center; gap:8px; }
    .typing-dots .dots { display:flex; gap:5px; }
    .typing-dots .dots span { width:6px; height:6px; border-radius:50%;
      background:var(--accent); opacity:0.3; animation:dot-bounce 1.2s ease-in-out infinite; }
    .typing-dots .dots span:nth-child(2) { animation-delay:0.2s; }
    .typing-dots .dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes dot-bounce { 0%,80%,100%{transform:scale(1);opacity:0.3} 40%{transform:scale(1.4);opacity:1} }

    .thinking-status { display:flex; align-items:center; gap:10px; padding:0 2px; }
    .phase-label { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px;
      color:var(--accent); transition:all 0.2s; }
    .phase-time { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); }

    /* ── Input ────────────────────────────────────────────── */
    .input-area { padding:14px 20px; border-top:1px solid var(--border);
      background:rgba(3,8,18,0.8); display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
    #chat-input { flex:1; background:rgba(8,20,36,0.95); border:1px solid var(--border);
      border-radius:6px; color:var(--text); font-family:'Rajdhani',sans-serif;
      font-size:14px; padding:10px 14px; resize:none; max-height:120px;
      outline:none; transition:border-color 0.2s; line-height:1.5; }
    #chat-input:focus { border-color:rgba(0,212,255,0.4); }
    #send-btn { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:2px;
      padding:10px 18px; background:transparent; border:1px solid var(--accent);
      color:var(--accent); border-radius:4px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    #send-btn:hover:not(:disabled) { background:var(--accent); color:#020408; }
    #send-btn:disabled { opacity:0.35; cursor:not-allowed; }

    .status-bar { padding:4px 20px; font-family:'Share Tech Mono',monospace;
      font-size:10px; color:var(--muted); display:flex; gap:16px; flex-shrink:0; }
    .status-bar span { color:var(--accent); }

    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:rgba(0,180,255,0.2); border-radius:2px; }
  </style>
</head>
<body>

  <div class="page-header">
    <h2>AI CHAT</h2>
    <div class="header-right">
      <button class="clear-btn" id="clear-btn" title="Clear conversation">CLEAR</button>
      <div class="model-badge" id="active-model">—</div>
    </div>
  </div>

  <div id="messages">
    <div class="thinking-wrap" id="thinking">
      <div class="typing-dots">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="thinking-status">
        <span class="phase-label" id="phase-label">PROCESSING</span>
        <span class="phase-time" id="phase-time">0.0s</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="chat-input" rows="1" placeholder="Ask anything... (Shift+Enter for new line)"></textarea>
    <button id="send-btn">SEND</button>
  </div>

  <div class="status-bar">
    <div>MODEL <span id="stat-model">—</span></div>
    <div>TASK <span id="stat-task">—</span></div>
    <div>MEMORY <span id="stat-memory">0 turns</span></div>
  </div>

  <script>
    const BACKEND     = 'http://localhost:8000';
    const SESSION_KEY = 'jarvis_chat_session_id';

    const input     = document.getElementById('chat-input');
    const sendBtn   = document.getElementById('send-btn');
    const msgs      = document.getElementById('messages');
    const thinkWrap = document.getElementById('thinking');
    const clearBtn  = document.getElementById('clear-btn');

    // ── Session ID — shared with voice pipeline via "default" ─────
    let sessionId = localStorage.getItem(SESSION_KEY) || 'default';
    localStorage.setItem(SESSION_KEY, sessionId);

    let turnCount     = 0;
    let ws            = null;
    let streaming     = false;
    let currentBubble = null;
    let currentText   = '';

    // ── Elapsed timer ──────────────────────────────────────────────
    let _timerInterval = null;
    let _timerStart    = 0;
    let _elapsed       = 0;

    function startTimer() {
      _timerStart = Date.now();
      _elapsed    = 0;
      document.getElementById('phase-time').textContent = '0.0s';
      _timerInterval = setInterval(() => {
        _elapsed = (Date.now() - _timerStart) / 1000;
        document.getElementById('phase-time').textContent = _elapsed.toFixed(1) + 's';
      }, 100);
    }

    function stopTimer() {
      if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
      _elapsed = (Date.now() - _timerStart) / 1000;
    }

    function setPhase(text) {
      document.getElementById('phase-label').textContent = text;
    }

    // ── Auto-resize textarea ───────────────────────────────────────
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    sendBtn.addEventListener('click', send);

    // ── WebSocket ──────────────────────────────────────────────────
    function connectWS() {
      ws = new WebSocket('ws://localhost:8000/ws');
      ws.onopen  = () => console.log('[chat-ws] connected');
      ws.onclose = () => { console.log('[chat-ws] reconnecting'); setTimeout(connectWS, 3000); };
      ws.onerror = (e) => console.error('[chat-ws] error', e);
      ws.onmessage = (e) => {
        let data;
        try { data = JSON.parse(e.data); } catch { return; }
        handleEvent(data);
      };
    }
    connectWS();

    function handleEvent(data) {
      switch (data.type) {

        case 'thinking':
          // Show indicator, start timer — bubble not created yet
          thinkWrap.classList.add('show');
          setPhase('PROCESSING');
          startTimer();
          currentText   = '';
          currentBubble = null;
          scrollBottom();
          break;

        case 'status': {
          // Phase updates from the ReAct loop
          const label = data.detail
            ? `${data.phase}: ${data.detail}`
            : data.phase;
          setPhase(label);
          break;
        }

        case 'token':
          // First token on streaming path — swap indicator for live bubble
          if (!currentBubble) {
            thinkWrap.classList.remove('show');
            stopTimer();
            currentBubble = addMsg('assistant', '', true);
          }
          currentText += data.token;
          currentBubble.querySelector('.msg-bubble').innerHTML =
            formatText(currentText) + '<span class="cursor"></span>';
          scrollBottom();
          break;

        case 'done': {
          stopTimer();
          thinkWrap.classList.remove('show');

          const finalText = (data.response != null && data.response !== '')
            ? data.response   // tool path — full response in done event
            : currentText;    // streaming path — accumulated tokens

          if (!currentBubble) {
            // Tool path — no tokens; create bubble now with elapsed badge
            currentBubble = addMsg('assistant', finalText, false, _elapsed);
          } else {
            // Streaming path — remove cursor
            currentBubble.querySelector('.msg-bubble').innerHTML = formatText(finalText);
          }

          turnCount++;
          document.getElementById('stat-memory').textContent  = turnCount + ' turns';
          document.getElementById('stat-model').textContent   = data.model || '—';
          document.getElementById('stat-task').textContent    = data.task_type || '—';
          document.getElementById('active-model').textContent = data.model || '—';

          sendBtn.disabled = false;
          streaming        = false;
          input.focus();
          break;
        }

        case 'error':
          stopTimer();
          thinkWrap.classList.remove('show');
          if (currentBubble) {
            currentBubble.querySelector('.msg-bubble').textContent =
              '[ERROR] ' + (data.message || 'Unknown error');
          } else {
            addMsg('assistant', '[ERROR] ' + (data.message || 'Unknown error'));
          }
          sendBtn.disabled = false;
          streaming        = false;
          break;
      }
    }

    // ── Send ───────────────────────────────────────────────────────
    function send() {
      const text = input.value.trim();
      if (!text || streaming) return;

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled   = true;
      streaming          = true;

      addMsg('user', text);
      scrollBottom();

      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({
          type:       'chat',
          message:    text,
          session_id: sessionId,
          use_tools:  true,
        }));
      } else {
        fetchRest(text);
      }
    }

    // REST fallback (when WS hasn't connected yet)
    async function fetchRest(text) {
      thinkWrap.classList.add('show');
      setPhase('CONNECTING');
      startTimer();
      currentText   = '';
      currentBubble = null;

      try {
        const resp = await fetch(`${BACKEND}/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId, use_tools: true }),
        });
        const reader = resp.body.getReader();
        const dec    = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          for (const line of dec.decode(value).split('\n')) {
            if (!line.startsWith('data:')) continue;
            const d = JSON.parse(line.slice(5).trim());
            if (d.token) {
              if (!currentBubble) {
                thinkWrap.classList.remove('show');
                stopTimer();
                currentBubble = addMsg('assistant', '', true);
              }
              currentText += d.token;
              currentBubble.querySelector('.msg-bubble').innerHTML =
                formatText(currentText) + '<span class="cursor"></span>';
              scrollBottom();
            }
            if (d.done) {
              stopTimer();
              thinkWrap.classList.remove('show');
              const finalText = (d.response != null && d.response !== '') ? d.response : currentText;
              if (!currentBubble) {
                currentBubble = addMsg('assistant', finalText, false, _elapsed);
              } else {
                currentBubble.querySelector('.msg-bubble').innerHTML = formatText(finalText);
              }
              turnCount++;
              document.getElementById('stat-memory').textContent  = turnCount + ' turns';
              document.getElementById('active-model').textContent = d.model || '—';
              document.getElementById('stat-model').textContent   = d.model || '—';
              document.getElementById('stat-task').textContent    = d.task_type || '—';
            }
          }
        }
      } catch (e) {
        stopTimer();
        thinkWrap.classList.remove('show');
        if (currentBubble) {
          currentBubble.querySelector('.msg-bubble').textContent = '[ERROR] ' + e.message;
        } else {
          addMsg('assistant', '[ERROR] ' + e.message);
        }
      }

      sendBtn.disabled = false;
      streaming        = false;
      input.focus();
    }

    // ── Clear ──────────────────────────────────────────────────────
    clearBtn.addEventListener('click', async () => {
      const old = sessionId;
      sessionId = 'session_' + Date.now();
      localStorage.setItem(SESSION_KEY, sessionId);

      msgs.innerHTML = `
        <div class="msg assistant">
          <div class="msg-meta"><span class="msg-role">JARVIS</span></div>
          <div class="msg-bubble">Memory cleared. Fresh start.</div>
        </div>
        <div class="thinking-wrap" id="thinking">
          <div class="typing-dots">
            <div class="dots"><span></span><span></span><span></span></div>
          </div>
          <div class="thinking-status">
            <span class="phase-label" id="phase-label">PROCESSING</span>
            <span class="phase-time" id="phase-time">0.0s</span>
          </div>
        </div>`;
      turnCount = 0;
      document.getElementById('stat-memory').textContent = '0 turns';

      fetch(`${BACKEND}/chat/clear?session_id=${old}`, { method: 'POST' }).catch(() => {});
    });

    // ── Load existing history on mount ─────────────────────────────
    async function loadHistory() {
      try {
        const r    = await fetch(`${BACKEND}/chat/history?session_id=${sessionId}&limit=60`);
        const data = await r.json();
        const hist = data.messages || [];

        if (hist.length === 0) {
          msgs.innerHTML = `
            <div class="msg assistant">
              <div class="msg-meta"><span class="msg-role">JARVIS</span></div>
              <div class="msg-bubble">Online. All systems nominal. How can I assist?</div>
            </div>
            <div class="thinking-wrap" id="thinking">
              <div class="typing-dots">
                <div class="dots"><span></span><span></span><span></span></div>
              </div>
              <div class="thinking-status">
                <span class="phase-label" id="phase-label">PROCESSING</span>
                <span class="phase-time" id="phase-time">0.0s</span>
              </div>
            </div>`;
          return;
        }

        msgs.innerHTML = '';
        for (const msg of hist) {
          addMsg(msg.role === 'user' ? 'user' : 'assistant', msg.content);
        }

        // Re-attach thinking indicator at end
        const t = document.createElement('div');
        t.className = 'thinking-wrap';
        t.id        = 'thinking';
        t.innerHTML = `
          <div class="typing-dots">
            <div class="dots"><span></span><span></span><span></span></div>
          </div>
          <div class="thinking-status">
            <span class="phase-label" id="phase-label">PROCESSING</span>
            <span class="phase-time" id="phase-time">0.0s</span>
          </div>`;
        msgs.appendChild(t);

        turnCount = Math.floor(hist.length / 2);
        document.getElementById('stat-memory').textContent = turnCount + ' turns';
        scrollBottom();
      } catch (e) {
        msgs.innerHTML = `
          <div class="msg assistant">
            <div class="msg-meta"><span class="msg-role">JARVIS</span></div>
            <div class="msg-bubble">Online. How can I assist?</div>
          </div>
          <div class="thinking-wrap" id="thinking">
            <div class="typing-dots">
              <div class="dots"><span></span><span></span><span></span></div>
            </div>
            <div class="thinking-status">
              <span class="phase-label" id="phase-label">PROCESSING</span>
              <span class="phase-time" id="phase-time">0.0s</span>
            </div>
          </div>`;
      }
    }

    // ── Helpers ────────────────────────────────────────────────────
    function addMsg(role, text, empty = false, elapsedSec = null) {
      // Keep thinking indicator at bottom — insert before it
      const anchor = document.getElementById('thinking');
      if (anchor) anchor.classList.remove('show');

      const div     = document.createElement('div');
      div.className = `msg ${role}`;

      const badge = (elapsedSec != null && elapsedSec > 0.2)
        ? `<span class="time-badge">${elapsedSec.toFixed(1)}s</span>`
        : '';

      div.innerHTML = `
        <div class="msg-meta">
          <span class="msg-role">${role === 'user' ? 'YOU' : 'JARVIS'}</span>
          ${role === 'assistant' ? badge : ''}
        </div>
        <div class="msg-bubble">${empty ? '' : formatText(text)}</div>`;

      if (anchor) {
        msgs.insertBefore(div, anchor);
      } else {
        msgs.appendChild(div);
      }
      scrollBottom();
      return div;
    }

    function formatText(text) {
      if (!text) return '';
      return text
        .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre>$2</pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    function scrollBottom() {
      msgs.scrollTop = msgs.scrollHeight;
    }

    loadHistory();
  </script>
</body>
</html>
